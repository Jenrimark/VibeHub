<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeHub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- 主视图：胶囊 -->
    <div id="mainView" class="main-view">
      <!-- 灵动岛胶囊。data-status 驱动配色。 -->
      <div id="pill" class="pill" data-status="idle" role="status" aria-live="polite">
        <div class="dot" id="dot"></div>
        <div class="content">
          <div class="line1">
            <span class="name" id="name">VibeHub</span>
            <span class="sep" id="sep">·</span>
            <span class="task" id="task">idle</span>
          </div>
          <div class="line2" id="line2">
            <span class="status-text" id="statusText"></span>
            <span class="timer" id="timer"></span>
          </div>
        </div>
      </div>
      <!-- 审批按钮区：胶囊下方，由 JS 动态渲染 -->
      <div class="actions" id="actions"></div>
    </div>

    <!-- 实时日志面板：点击胶囊展开/折叠 -->
    <div id="logPanel" class="log-panel hidden" role="log" aria-live="polite">
      <div class="log-header">
        <span class="log-title">Event Log</span>
        <button class="log-clear" id="logClear" title="Clear log">✕</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

    <!-- 右键上下文菜单 -->
    <div id="contextMenu" class="context-menu hidden" role="menu">
      <button class="ctx-item" data-action="log" role="menuitem">📋 事件日志</button>
      <button class="ctx-item" data-action="settings" role="menuitem">⚙️ 设置</button>
    </div>

    <!-- 设置页面（全页面视图，取代胶囊） -->
    <div id="settingsPage" class="settings-page" role="dialog" aria-label="Settings">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button class="settings-close" id="settingsClose" aria-label="Close settings">✕</button>
      </div>
      <div class="setting-item">
        <label>Hook Status</label>
        <span class="setting-value" id="hookStatus" style="font-size:11px">checking...</span>
      </div>
      <div class="setting-item">
        <label>Port</label>
        <input type="text" id="settPort" value="51789" readonly />
      </div>
      <div class="setting-item">
        <label>Hook Path</label>
        <input type="text" id="settHookPath" value="..." readonly class="setting-path" />
      </div>
      <div class="setting-item">
        <label for="settAlwaysOnTop">Always on Top</label>
        <label class="toggle">
          <input type="checkbox" id="settAlwaysOnTop" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <label>Version</label>
        <span class="setting-value">0.2.0</span>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
